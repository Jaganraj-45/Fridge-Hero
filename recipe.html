<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Your Recipe - Fridge Hero</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      .recipe-header {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 2rem;
        text-align: center;
      }
      .cute-food {
        margin-bottom: 1rem;
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }
      .back-btn {
        background: transparent;
        border: 2px solid var(--primary-color);
        color: var(--primary-color);
        padding: 0.8rem 1.5rem;
        border-radius: 12px;
        font-family: var(--font-main);
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-top: 2rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        text-decoration: none;
      }
      .back-btn:hover {
        background: var(--primary-color);
        color: white;
        transform: translateY(-2px);
      }
    </style>
    <script type="module" crossorigin src="./recipe-Bm0jNZ9M.js"></script>
    <link rel="modulepreload" crossorigin href="./style-BPysieQ0.js">
    <link rel="stylesheet" crossorigin href="./style-q_WNSESN.css">
  </head>
  <body>
    <div class="app-container">
      <main class="main-content">
        <div id="recipeCard" class="recipe-card shadow-glass">
          <div class="recipe-header">
            <!-- Cute Smiling Egg SVG -->
            <div class="cute-food">
              <svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <circle cx="50" cy="50" r="45" fill="#2d3436" />
                <path d="M 25,40 C 15,15 65,10 75,30 C 85,50 85,85 50,85 C 15,85 10,65 25,40 Z" fill="#ffffff" />
                <circle cx="55" cy="55" r="16" fill="#FFE66D" />
                <circle cx="49" cy="52" r="2.5" fill="#2d3436" />
                <circle cx="61" cy="52" r="2.5" fill="#2d3436" />
                <path d="M 52,58 Q 55,62 58,58" fill="none" stroke="#2d3436" stroke-width="2.5" stroke-linecap="round" />
                <!-- Blush -->
                <ellipse cx="46" cy="56" rx="3" ry="1.5" fill="#FF6B6B" opacity="0.6" />
                <ellipse cx="64" cy="56" rx="3" ry="1.5" fill="#FF6B6B" opacity="0.6" />
              </svg>
            </div>
            <h2>Tada! Your Recipe is Ready!</h2>
          </div>
          <div id="recipeContent" class="recipe-content">
            <!-- Recipe goes here -->
          </div>
          
          <div style="text-align: center;">
            <a href="/" class="back-btn">
              <span>← Cook Another Meal</span>
            </a>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
